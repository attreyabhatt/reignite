<div id="communityReportModal" class="community-modal community-hidden" data-community-report-modal>
    <div class="community-modal-card">
        <h3 class="matte-headline text-xl font-semibold">Report Content</h3>
        <p class="community-modal-copy">Pick the reason that best matches this content. Reports are reviewed by moderators.</p>
        <div class="community-modal-reasons">
            <button type="button" class="community-modal-reason" data-report-reason="spam">Spam</button>
            <button type="button" class="community-modal-reason" data-report-reason="harassment">Harassment</button>
            <button type="button" class="community-modal-reason" data-report-reason="inappropriate">Inappropriate Content</button>
            <button type="button" class="community-modal-reason" data-report-reason="other">Other</button>
        </div>
        <div class="community-modal-footer">
            <button type="button" class="community-ghost-btn" data-report-cancel>Cancel</button>
        </div>
    </div>
</div>
<div id="communityToast" class="community-toast community-hidden" data-community-toast></div>
