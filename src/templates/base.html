<!DOCTYPE html>
<html lang="en" class="scroll-smooth dark">

<head>
    {% load static %}
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block head_title %}{% endblock head_title %}</title>

    <link rel="icon" href="{% static 'images/favicon.svg' %}" type="image/svg+xml">
    <link rel="alternate icon" href="{% static 'images/favicon.ico' %}" type="image/x-icon">

    <!-- Tailwind CSS (Play CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            bg: '#12141A',
                            surface: '#16181F',
                            primary: '#FF2D6D',
                            secondary: '#D4AF37',
                            tertiary: '#FF2D6D',
                            text: '#F4F2EE',
                            muted: '#8F9BB3',
                            outline: '#3A3F4A',
                            blush: '#1B1E25',
                            'outline-variant': '#2E323B',
                            'surface-dim': '#101218',
                            'surface-container': '#16181F',
                        },
                        dbrand: {
                            bg: '#12141A',
                            surface: '#16181F',
                            primary: '#FF2D6D',
                            secondary: '#D4AF37',
                            tertiary: '#FF2D6D',
                            text: '#F4F2EE',
                            muted: '#8F9BB3',
                            outline: '#3A3F4A',
                            'outline-variant': '#2E323B',
                            'surface-container': '#16181F',
                            'surface-high': '#1B1E25',
                            'surface-low': '#101218',
                        },
                    },
                    fontFamily: {
                        heading: ['"Playfair Display"', 'serif'],
                        body: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    borderRadius: {
                        'xl': '12px',
                        '2xl': '12px',
                    },
                },
            },
        }
    </script>

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome (icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-5KFLPTVDQ7"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-5KFLPTVDQ7');
    </script>

    <style>
        :root {
            --matte-bg: #12141A;
            --matte-surface: #16181F;
            --matte-surface-deep: #101218;
            --matte-border: #3A3F4A;
            --matte-border-soft: #2E323B;
            --matte-text: #F4F2EE;
            --matte-muted: #8F9BB3;
            --matte-pink: #FF2D6D;
            --matte-gold: #D4AF37;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--matte-bg);
            color: var(--matte-text);
        }

        * {
            scrollbar-width: thin;
            scrollbar-color: #2E323B #12141A;
        }

        *::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        *::-webkit-scrollbar-track {
            background: #12141A;
        }

        *::-webkit-scrollbar-thumb {
            background: #2E323B;
            border-radius: 4px;
            border: 1px solid #12141A;
        }

        *::-webkit-scrollbar-thumb:hover {
            background: #3A3F4A;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            font-family: 'Playfair Display', serif;
        }

        .matte-muted {
            color: var(--matte-muted);
        }

        .matte-shell {
            background: var(--matte-bg);
            color: var(--matte-text);
        }

        .matte-headline,
        .matte-shell h1,
        .matte-shell h2,
        .matte-shell h3,
        .matte-shell h4,
        .matte-shell h5,
        .matte-shell h6 {
            color: var(--matte-text);
            font-family: 'Playfair Display', serif;
        }

        .matte-copy {
            color: var(--matte-muted);
        }

        .matte-card {
            background: var(--matte-surface);
            border: 1px solid var(--matte-border);
            border-radius: 12px;
        }

        .matte-card-tight {
            background: var(--matte-surface);
            border: 1px solid var(--matte-border-soft);
            border-radius: 10px;
        }

        .matte-input,
        .matte-select,
        .matte-textarea {
            width: 100%;
            border: 1px solid var(--matte-border);
            border-radius: 10px;
            background: var(--matte-bg);
            color: var(--matte-text);
            padding: .75rem .9rem;
            font-size: .95rem;
        }

        .matte-input::placeholder,
        .matte-select::placeholder,
        .matte-textarea::placeholder {
            color: #6f7a93;
        }

        .matte-input:focus,
        .matte-select:focus,
        .matte-textarea:focus {
            outline: none;
            border-color: var(--matte-pink);
            box-shadow: 0 0 0 1px rgba(255, 45, 109, .28);
        }

        .matte-btn-primary {
            background: var(--matte-pink);
            border: 1px solid var(--matte-pink);
            color: var(--matte-text);
            border-radius: 10px;
            font-weight: 700;
            transition: opacity .2s ease;
        }

        .matte-btn-primary:hover {
            opacity: .9;
        }

        .matte-btn-secondary {
            background: transparent;
            border: 1px solid var(--matte-border);
            color: var(--matte-text);
            border-radius: 10px;
            font-weight: 600;
            transition: border-color .2s ease, color .2s ease;
        }

        .matte-btn-secondary:hover {
            border-color: var(--matte-pink);
        }

        .glass {
            position: relative;
            isolation: isolate;
            background: var(--matte-surface);
            border: 1px solid var(--matte-border);
            border-radius: 12px;
        }

        .glass::before {
            display: none;
        }

        .hover-lift {
            transition: transform .2s ease;
        }

        .hover-lift:hover {
            transform: translateY(-2px);
        }

        .bg-white {
            background-color: var(--matte-surface) !important;
        }

        .bg-green-50 {
            background-color: rgba(34, 197, 94, 0.12) !important;
        }

        .bg-red-50 {
            background-color: rgba(239, 68, 68, 0.12) !important;
        }

        .bg-amber-50 {
            background-color: rgba(245, 158, 11, 0.12) !important;
        }

        .bg-brand-bg,
        .dark\:bg-dbrand-bg,
        .dark\:bg-dbrand-surface,
        .dark\:bg-dbrand-surface-container,
        .dark\:bg-dbrand-surface-high,
        .dark\:bg-dbrand-surface-low {
            background-color: var(--matte-surface) !important;
        }

        .bg-brand-bg {
            background-color: var(--matte-bg) !important;
        }

        .text-brand-muted,
        .dark\:text-dbrand-muted {
            color: var(--matte-muted) !important;
        }

        .text-brand-text,
        .dark\:text-dbrand-text {
            color: var(--matte-text) !important;
        }

        .border-brand-outline,
        .dark\:border-dbrand-outline {
            border-color: var(--matte-border) !important;
        }

        .from-brand-primary,
        .to-brand-tertiary,
        .dark\:from-dbrand-primary,
        .dark\:to-dbrand-tertiary {
            --tw-gradient-from: var(--matte-pink) !important;
            --tw-gradient-to: rgb(255 45 109 / 0) !important;
            --tw-gradient-stops: var(--tw-gradient-from), var(--tw-gradient-to) !important;
        }

        .bg-gradient-to-r,
        .bg-gradient-to-b,
        .bg-gradient-to-br {
            background-image: none !important;
            background-color: var(--matte-pink) !important;
        }

        .copied-tooltip {
            display: none;
            position: absolute;
            top: 120%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 8px;
            z-index: 10;
        }

        @media (prefers-reduced-motion: reduce) {
            .hover-lift {
                transition: none;
            }

            .hover-lift:hover {
                transform: none;
            }
        }
    </style>

    {% block extra_head %}
    {% endblock extra_head %}
</head>

<body class="flex flex-col min-h-screen bg-brand-bg text-brand-text font-body">
    {% include "navbar.html" %}
    <main class="flex-grow pt-0 bg-brand-bg">
        {% block content %}
        {% endblock %}
        <footer>
            {% include "footer.html" %}
        </footer>
    </main>

    <script>
        // Copy suggestion analytics
        document.addEventListener('click', function (e) {
            if (e.target.classList.contains('copy-btn')) {
                const suggestionId = e.target.dataset.suggestionId || 'unknown';
                gtag('event', 'copy_suggestion', {
                    event_category: 'engagement',
                    event_label: 'suggestion_' + suggestionId,
                    value: 1
                });
            }
        });
    </script>
    {% block extra_scripts %}
    {% endblock %}
</body>

</html>
