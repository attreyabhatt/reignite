{% if suggestions %}
    {% for suggestion in suggestions %}
    <div class="relative bg-white dark:bg-dbrand-surface-container rounded-xl p-4 border border-brand-outline/30 dark:border-dbrand-outline shadow-sm {% if not forloop.last %}mb-3{% endif %}">
        <button
            type="button"
            class="copy-btn absolute right-3 top-3 text-brand-muted dark:text-dbrand-muted hover:text-brand-primary dark:hover:text-dbrand-primary transition-colors"
            data-copy-target="suggestedReplyMsg{{ forloop.counter }}"
            data-suggestion-id="{{ forloop.counter }}"
            title="Copy"
        >
            <i class="fa fa-copy"></i>
            <span class="copied-tooltip bg-brand-text dark:bg-dbrand-surface-container text-white">Copied!</span>
        </button>
        <div id="suggestedReplyMsg{{ forloop.counter }}" class="text-sm whitespace-pre-wrap pr-8">{{ suggestion.message }}</div>
        {% if suggestion.confidence_label %}
        <div class="text-xs text-brand-muted dark:text-dbrand-muted mt-1">{{ suggestion.confidence_label }}</div>
        {% endif %}
    </div>
    {% endfor %}
{% else %}
    {% include "conversation/partials/response_empty.html" %}
{% endif %}
